<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>O Confronto Final: Consórcio vs Financiamento vs Investimento</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 0; background:#f0f4f8; color: #1e293b; }
    .wrap { max-width: 1200px; margin: 20px auto; padding: 15px; }
    .card { background:#fff; border-radius: 16px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    h1 { color: #0f172a; margin-bottom: 5px; font-size: 26px; text-align: center; }
    .subtitle { color: #64748b; margin-bottom: 25px; text-align: center; }
    
    .grid-inputs { display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
    label { display:block; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; color: #475569; }
    input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; box-sizing: border-box; }

    .actions { display: flex; gap: 10px; margin-bottom: 30px; }
    button { border: 0; padding: 15px 25px; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.3s; }
    .btn-calc { background: #1e293b; color: #fff; flex: 2; }
    .btn-reset { background: #e2e8f0; color: #475569; flex: 1; }

    .chart-container { margin: 30px 0; height: 450px; }

    .results-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
    .res-box { padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; }
    .res-box.finan { border-top: 6px solid #2563eb; }
    .res-box.consorcio { border-top: 6px solid #ef4444; }
    .res-box.invest { border-top: 6px solid #22c55e; background: #f0fdf4; }
    
    .val { font-size: 20px; font-weight: 800; display: block; margin-top: 5px; }
    .label-res { font-size: 12px; color: #64748b; font-weight: 600; }

    .highlight { background: #0f172a; color: #fff; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 25px; line-height: 1.6; }
    .highlight b { color: #4ade80; }

    .table-wrap { overflow-x: auto; max-height: 400px; border: 1px solid #e2e8f0; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { background: #f8fafc; color: #475569; padding: 12px; text-align: left; position: sticky; top: 0; border-bottom: 2px solid #e2e8f0; }
    td { padding: 10px; border-bottom: 1px solid #f1f5f9; }
    .row-win { background: #dcfce7 !important; font-weight: 700; }
    
    @media (max-width: 900px) { .results-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <h1>Comparativo: Financiamento vs Consórcio vs Investimento</h1>
    <p class="subtitle"> Queridos alunos! Observem esse comparativo financeiro e façam escolhas inteligentes.</p>

    <div class="grid-inputs">
      <div>
        <label>Valor do Bem (R$)</label>
        <input id="valorBem" type="number" value="70000">
      </div>
      <div>
        <label>Prazo (Meses)</label>
        <input id="prazo" type="number" value="60">
      </div>
      <div>
        <label>Juros Finan. (% am)</label>
        <input id="taxaFinan" type="number" step="0.01" value="1.6">
      </div>
      <div>
        <label>Taxa Adm. Cons. (%)</label>
        <input id="taxaAdm" type="number" value="16">
      </div>
      <div>
        <label>Reajuste Bem (% ao ano)</label>
        <input id="inflacao" type="number" step="0.1" value="5">
      </div>
      <div>
        <label>Rentabilidade (% am)</label>
        <input id="rendimento" type="number" step="0.01" value="0.9">
      </div>
    </div>

    <div class="actions">
      <button class="btn-calc" onclick="simular()">Simular Cenários</button>
      <button class="btn-reset" onclick="location.reload()">Limpar</button>
    </div>

    <div id="resultadoFinal" class="highlight" style="display:none"></div>

    <div class="results-grid">
      <div class="res-box finan">
        <span class="label-res">TOTAL FINANCIAMENTO</span>
        <span class="val" id="totalFinan">—</span>
        <small id="subFinan"></small>
      </div>
      <div class="res-box consorcio">
        <span class="label-res">TOTAL CONSÓRCIO</span>
        <span class="val" id="totalConsorcio">—</span>
        <small id="subConsorcio"></small>
      </div>
      <div class="res-box invest">
        <span class="label-res">VALOR FINAL INVESTINDO</span>
        <span class="val" id="totalInvestido">—</span>
        <small id="subInvest"></small>
      </div>
    </div>

    <div class="chart-container">
      <canvas id="meuGrafico"></canvas>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Mês</th>
            <th>Acumulado Finan.</th>
            <th>Acumulado Consór.</th>
            <th>Saldo Investimento</th>
            <th>Valor do Bem</th>
          </tr>
        </thead>
        <tbody id="tabelaCorpo"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  let chartInstance = null;
  const brl = (n) => n.toLocaleString("pt-BR", { style:"currency", currency:"BRL" });

  function simular() {
    const valorInicial = Number(document.getElementById("valorBem").value);
    const prazo = Number(document.getElementById("prazo").value);
    const taxaFinan = Number(document.getElementById("taxaFinan").value) / 100;
    const taxaAdm = Number(document.getElementById("taxaAdm").value) / 100;
    const inflacaoAnual = Number(document.getElementById("inflacao").value) / 100;
    const jurosInv = Number(document.getElementById("rendimento").value) / 100;

    // --- CÁLCULOS FIXOS ---
    // Financiamento (Price)
    const parcelaFinan = valorInicial * (taxaFinan * Math.pow(1 + taxaFinan, prazo)) / (Math.pow(1 + taxaFinan, prazo) - 1);
    
    let totalAcumFinan = 0;
    let totalAcumConsorcio = 0;
    let saldoInvestimento = 0;
    let valorBemAtual = valorInicial;
    let parcelaConsorcioBase = (valorInicial * (1 + taxaAdm)) / prazo;
    let mesVitoria = -1;

    const labels = [];
    const dFinan = [];
    const dCons = [];
    const dInv = [];
    const dValBem = [];

    const tabela = document.getElementById("tabelaCorpo");
    tabela.innerHTML = "";

    for (let m = 1; m <= prazo; m++) {
      // Reajuste Anual do Consórcio e do Bem
      if (m > 1 && (m - 1) % 12 === 0) {
        valorBemAtual *= (1 + inflacaoAnual);
        parcelaConsorcioBase = (valorBemAtual * (1 + taxaAdm)) / prazo;
      }

      totalAcumFinan += parcelaFinan;
      totalAcumConsorcio += parcelaConsorcioBase;
      
      // No investimento, simulamos que você investe o valor que pagaria no Consórcio
      saldoInvestimento = (saldoInvestimento + parcelaConsorcioBase) * (1 + jurosInv);

      let inflacaoMensal = Math.pow(1 + inflacaoAnual, 1/12) - 1;
      let valorBemNoMes = valorInicial * Math.pow(1 + inflacaoMensal, m);

      if (mesVitoria === -1 && saldoInvestimento >= valorBemNoMes) mesVitoria = m;

      // Dados Gráfico
      labels.push(m);
      dFinan.push(totalAcumFinan.toFixed(2));
      dCons.push(totalAcumConsorcio.toFixed(2));
      dInv.push(saldoInvestimento.toFixed(2));
      dValBem.push(valorBemNoMes.toFixed(2));

      // Tabela
      const tr = document.createElement("tr");
      if (m === mesVitoria) tr.className = "row-win";
      tr.innerHTML = `
        <td>${m}</td>
        <td>${brl(totalAcumFinan)}</td>
        <td>${brl(totalAcumConsorcio)}</td>
        <td>${brl(saldoInvestimento)}</td>
        <td>${brl(valorBemNoMes)}</td>
      `;
      tabela.appendChild(tr);
    }

    renderizarGrafico(labels, dFinan, dCons, dInv, dValBem);

    document.getElementById("totalFinan").textContent = brl(totalAcumFinan);
    document.getElementById("subFinan").textContent = `Parcelas fixas de ${brl(parcelaFinan)}`;
    
    document.getElementById("totalConsorcio").textContent = brl(totalAcumConsorcio);
    document.getElementById("subConsorcio").textContent = `Parcelas variáveis (reajuste anual)`;

    document.getElementById("totalInvestido").textContent = brl(saldoInvestimento);
    document.getElementById("subInvest").textContent = `Acúmulo com juros compostos`;

    document.getElementById("resultadoFinal").style.display = "block";
    document.getElementById("resultadoFinal").innerHTML = `
      🚨 <b>Análise de Dados:</b> O Financiamento custa <b>${((totalAcumFinan/valorInicial - 1)*100).toFixed(0)}%</b> a mais que o valor original do bem.<br>
      Investindo a mesma parcela, você compra o bem à vista no <b>mês ${mesVitoria}</b> e economiza <b>${brl(saldoInvestimento - totalAcumConsorcio)}</b> em relação ao consórcio!
    `;
  }

  function renderizarGrafico(labels, finan, cons, inv, bem) {
    const ctx = document.getElementById('meuGrafico').getContext('2d');
    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          { label: 'Financiamento (Acumulado)', data: finan, borderColor: '#2563eb', borderWidth: 2, fill: false },
          { label: 'Consórcio (Acumulado)', data: cons, borderColor: '#ef4444', borderWidth: 2, fill: false },
          { label: 'Investimento (Saldo)', data: inv, borderColor: '#22c55e', borderWidth: 3, fill: true, backgroundColor: 'rgba(34, 197, 94, 0.05)' },
          { label: 'Valor do Bem (Reajustado)', data: bem, borderColor: '#94a3b8', borderDash: [5, 5], fill: false }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom' } },
        scales: { y: { ticks: { callback: v => 'R$' + v/1000 + 'k' } } }
      }
    });
  }

  simular();
</script>

</body>
</html>
